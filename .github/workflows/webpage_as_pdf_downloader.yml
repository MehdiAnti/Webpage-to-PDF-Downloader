name: Save webpage as PDF

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      title:
        description: 'Optional title for the output file'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyppeteer

      - name: Run webpage to PDF
        run: |
          if [ -n "${{ github.event.inputs.title }}" ]; then
            python webpage_to_pdf.py --url "${{ github.event.inputs.url }}" --title "${{ github.event.inputs.title }}"
          else
            python webpage_to_pdf.py --url "${{ github.event.inputs.url }}"
          fi

      - name: Commit and push download folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          git commit -m "Add PDF for ${{ github.event.inputs.url }}" || echo "No changes to commit"
          git push
